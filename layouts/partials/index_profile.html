<div class="profile">
    {{- with .Site.Params.profileMode }}
    <div class="profile_inner">
        {{- if .imageUrl -}}
        {{- $img := resources.Get .imageUrl -}}
        <img draggable="false" src="{{ if $img }}{{ $img.Permalink }}{{ else }}{{ .imageUrl | absURL }}{{ end }}"
            alt="{{ .imageTitle | default " profile image" }}" height="{{ .imageHeight | default 120 }}"
            width="{{ .imageWidth | default 120 }}" />
        {{- end }}

        <h1>{{ .title | default site.Title | markdownify }}</h1>
        <p class="subtitle">{{ .subtitle | markdownify }}</p>

        {{- partial "social_icons.html" -}}

        <div class="profile-content">
            {{ $.Content }}
        </div>
    </div>
    {{- end}}
</div>
